# Prometheus 配置文件
# 抓取 GCP Monitor Exporter 暴露的指标

global:
  scrape_interval: 60s        # 与 Exporter 采集间隔保持一致
  scrape_timeout: 30s         # GCP API 查询可能较慢，设置较长超时
  evaluation_interval: 60s    # 告警规则评估间隔

# 抓取任务配置
scrape_configs:
  - job_name: "gcp_monitor"
    honor_labels: true
    static_configs:
      - targets: ["gcp-monitor-exporter:9100"]
        labels:
          env: "production"
